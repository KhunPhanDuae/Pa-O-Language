
<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ကျွန်ုပ်၏ ကိုယ်ပိုင် ပအိုဝ်း AI</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .chat-box { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        input, button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 4px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="chat-box">
    <h3>ပအိုဝ်း AI (Brand Name)</h3>
    <input type="text" id="userInput" placeholder="ပအိုဝ်းလို စာရိုက်ပါ...">
    <button onclick="askAI()">မေးမြန်းမည်</button>
    <p id="aiReply" style="margin-top: 15px; font-weight: bold; color: #007bff;"></p>
</div>

<script>
async function askAI() {
    const msg = document.getElementById("userInput").value;
    const apiStyleUrl = "https://script.google.com/macros/library/d/1_tjGF3MWu68Cnp_My4Lb4b36HkhhmjgF-HgLxVbcUi6xKRmqwWRtSluU/11
"; // အဆင့် ၂ မှ ရလာမည့် URL ထည့်ရန်
    
    document.getElementById("aiReply").innerText = "AI စဉ်းစားနေသည်...";
    
    // API သို့ ဒေတာလှမ်းပို့ခြင်း
    const response = await fetch(apiStyleUrl, {
        method: "POST",
        body: JSON.stringify({ message: msg })
    });
    
    const data = await response.json();
    document.getElementById("aiReply").innerText = "အဖြေ: " + data.reply;
}
</script>
</body>
</html>
